name: Generate Documentation (Reusable)

on:
  workflow_call:
    inputs:
      version:
        description: 'Version tag (e.g. 1.2)'
        required: true
        type: string
      tag:
        description: 'Full tag (e.g. v1.2)'
        required: true
        type: string

jobs:
  generate-docs:
    runs-on: windows-latest

    steps:
      - name: Checkout calling repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout shared-workflows (for Generate-Docs.js)
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/shared-workflows
          path: _shared

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install docx package
        run: npm install docx
        working-directory: _shared/.github/workflows/scripts

      - name: Create docs folder if needed
        shell: pwsh
        run: |
          if (-not (Test-Path "docs")) {
            New-Item -ItemType Directory -Path "docs"
          }

      - name: Generate Word documents
        shell: pwsh
        run: |
          node _shared/.github/workflows/scripts/Generate-Docs.js `
            --version "${{ inputs.version }}" `
            --repo "${{ github.repository }}" `
            --tag "${{ inputs.tag }}"

      - name: Commit and push Word documents
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if (git diff --staged --quiet) {
            Write-Host "No changes to commit"
          } else {
            git stash
            git pull origin ${{ github.event.repository.default_branch }} --rebase
            git stash pop
            git add docs/
            git commit -m "docs: generate documentation for ${{ inputs.tag }}"
            git push origin HEAD:${{ github.event.repository.default_branch }}
          }

